# ============================================================
#  🤖 Keep Bot Alive — GitHub Actions Workflow
# ============================================================
#  Pings the Render-hosted bot every 1 hours to prevent the
#  free-tier server from spinning down due to inactivity.
#
#  Security: The target URL is stored as a GitHub Secret
#  (RENDER_URL) and injected at runtime — never hardcoded.
# ============================================================

name: "🤖 Keep Bot Alive"

on:
  # ── Scheduled trigger: every 1 hours ──
  schedule:
    - cron: "0 * * * *"

  # ── Manual trigger from the Actions tab ──
  workflow_dispatch:

# Minimal permissions for security
permissions:
  contents: read

jobs:
  keep-alive:
    name: "🏓 Ping Render Service"
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repository code ──
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ── 2. Set up Python runtime ──
      - name: 🐍 Set Up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      # ── 3. Install dependencies ──
      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      # ── 4. Run the ping script ──
      - name: 🚀 Ping Service
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: python main.py

